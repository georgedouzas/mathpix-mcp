inherit_from: .rubocop_todo.yml

plugins:
  - rubocop-rake
  - rubocop-rspec

AllCops:
  TargetRubyVersion: 3.3
  NewCops: enable
  SuggestExtensions: false
  Exclude:
    - 'vendor/**/*'
    - 'tmp/**/*'

# Project style choices
Style/Documentation:
  Enabled: false

Metrics/MethodLength:
  Max: 40
Metrics/AbcSize:
  Max: 40
Metrics/ClassLength:
  Max: 300
Metrics/CyclomaticComplexity:
  Max: 12
Metrics/PerceivedComplexity:
  Max: 12
Metrics/BlockLength:
  Exclude:
    - 'spec/**/*'

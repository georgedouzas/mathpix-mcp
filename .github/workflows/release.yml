name: Release

on:
  push:
    tags: ['v*']

jobs:
  gem:
    name: Publish gem (RubyGems Trusted Publishing)
    runs-on: ubuntu-latest
    permissions:
      contents: write   # create the GitHub release
      id-token: write   # OIDC token for RubyGems trusted publishing
    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4'
          bundler-cache: true

      # Builds the gem and pushes it to RubyGems via trusted publishing (OIDC).
      # No API key/secret required — see CONTRIBUTING.md for the one-time setup.
      - uses: rubygems/release-gem@v1

  docker:
    name: Build & push image (GHCR)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
